<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joyce 代購 CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Loading */
#loading-overlay { display:none; position:fixed; inset:0; background:rgba(245,243,255,0.92); z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#loading-overlay.show { display:flex; }
.spinner { width:36px; height:36px; border:3px solid #E5E7EB; border-top-color:#7C3AED; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:0.85rem; color:#6B7280; font-weight:500; }
/* Toast */
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1F2937; color:white; padding:8px 18px; border-radius:99px; font-size:0.8rem; font-weight:600; opacity:0; transition:opacity 0.2s; pointer-events:none; z-index:300; white-space:nowrap; }
#toast.show { opacity:1; }</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; background: #F5F3FF; color: #1F2937; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%); padding: 14px 20px; color: white; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(124,58,237,0.3); }
.header-left h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
.header-left p { font-size: 0.7rem; opacity: 0.8; margin-top: 1px; }
.header-right { font-size: 0.7rem; opacity: 0.75; text-align: right; }

/* Nav */
.nav { background: white; display: flex; border-bottom: 1px solid #E5E7EB; position: sticky; top: 57px; z-index: 99; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.nav-btn { flex: 1; padding: 11px 4px; text-align: center; cursor: pointer; font-size: 0.82rem; color: #6B7280; border-bottom: 2.5px solid transparent; font-weight: 500; transition: all 0.15s; user-select: none; }
.nav-btn.active { color: #7C3AED; border-bottom-color: #7C3AED; background: #FAFAFF; }
.nav-btn:hover:not(.active) { background: #F9FAFB; color: #4B5563; }

/* Content */
.content { padding: 14px 14px 80px; max-width: 960px; margin: 0 auto; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Cards */
.card { background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 12px; }
.card-sm { padding: 12px 14px; }
.section-title { font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.section-title span { font-size: 0.72rem; font-weight: 500; color: #9CA3AF; }

/* Metric cards grid */
.metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.metric-card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.metric-label { font-size: 0.68rem; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.metric-value { font-size: 1.5rem; font-weight: 800; color: #1F2937; line-height: 1; }
.metric-sub { font-size: 0.7rem; color: #9CA3AF; margin-top: 5px; }
.metric-card.purple .metric-value { color: #7C3AED; }
.metric-card.green .metric-value { color: #059669; }
.metric-card.red .metric-value { color: #DC2626; }
.metric-card.pink .metric-value { color: #DB2777; }

/* Stat rows */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #F3F4F6; font-size: 0.82rem; }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #6B7280; }
.stat-val { font-weight: 600; color: #1F2937; }
.stat-val.green { color: #059669; }
.stat-val.red { color: #DC2626; }
.stat-val.purple { color: #7C3AED; }

/* Alert */
.alert { padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; font-size: 0.8rem; }
.alert-warn { background: #FEF3C7; border-left: 3px solid #F59E0B; color: #92400E; }
.alert-info { background: #EDE9FE; border-left: 3px solid #7C3AED; color: #5B21B6; }

/* Progress */
.progress { background: #F3F4F6; border-radius: 99px; height: 5px; overflow: hidden; margin-top: 5px; }
.progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #7C3AED, #EC4899); transition: width 0.4s; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.filter-bar input, .filter-bar select { padding: 7px 10px; border: 1.5px solid #E5E7EB; border-radius: 8px; font-size: 0.8rem; color: #374151; outline: none; background: white; }
.filter-bar input:focus, .filter-bar select:focus { border-color: #7C3AED; }
.filter-bar input { flex: 1; min-width: 120px; }

/* Table summary bar */
.table-bar { background: #EDE9FE; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.78rem; color: #5B21B6; }
.table-bar strong { font-weight: 700; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 700px; }
thead th { background: #F9FAFB; padding: 9px 8px; text-align: left; font-weight: 600; color: #6B7280; font-size: 0.71rem; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; border-bottom: 1px solid #E5E7EB; }
tbody td { padding: 9px 8px; border-bottom: 1px solid #F3F4F6; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAFF; }
.pos { color: #059669; font-weight: 700; }
.neg { color: #DC2626; font-weight: 700; }
.missing-tag { color: #F59E0B; font-size: 0.7rem; font-weight: 500; }

/* Status toggle buttons */
.s-btn { padding: 3px 7px; border-radius: 6px; border: 1.5px solid; cursor: pointer; font-size: 0.68rem; font-weight: 700; transition: all 0.12s; background: white; line-height: 1.4; }
.s-btn.on { background: #D1FAE5; border-color: #10B981; color: #065F46; }
.s-btn.off { background: #F9FAFB; border-color: #E5E7EB; color: #9CA3AF; }
.s-btn:hover { opacity: 0.8; }

/* Action buttons in table */
.icon-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 2px 4px; opacity: 0.5; transition: opacity 0.1s; }
.icon-btn:hover { opacity: 1; }

/* Customer cards */
.cust-card { background: white; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #EC4899); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.95rem; flex-shrink: 0; }
.cust-name { font-weight: 700; font-size: 0.9rem; }
.cust-meta { font-size: 0.72rem; color: #9CA3AF; margin-top: 2px; }
.cust-stats { margin-left: auto; text-align: right; }
.cust-profit { font-weight: 800; font-size: 0.95rem; color: #059669; }
.cust-orders { font-size: 0.7rem; color: #9CA3AF; }

/* Badge */
.badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 0.68rem; font-weight: 700; }
.badge-red { background: #FEE2E2; color: #991B1B; }
.badge-yellow { background: #FEF3C7; color: #92400E; }
.badge-green { background: #D1FAE5; color: #065F46; }

/* FAB */
.fab { position: fixed; bottom: 20px; right: 18px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #EC4899); color: white; font-size: 1.6rem; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(124,58,237,0.45); border: none; z-index: 50; transition: transform 0.12s; }
.fab:hover { transform: scale(1.08); }
.fab:active { transform: scale(0.96); }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.22s ease; }
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { padding: 18px 18px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 1rem; font-weight: 800; }
.modal-close { background: #F3F4F6; border: none; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #6B7280; }
.modal-body { padding: 16px 18px; }
.modal-footer { padding: 0 18px 20px; display: flex; gap: 8px; }

/* Form */
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 0.75rem; font-weight: 700; color: #374151; margin-bottom: 5px; }
.form-input { width: 100%; padding: 9px 11px; border: 1.5px solid #E5E7EB; border-radius: 8px; font-size: 0.88rem; color: #1F2937; outline: none; font-family: inherit; }
.form-input:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.profit-box { background: #F5F3FF; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
.profit-box-label { color: #6B7280; }
.profit-box-val { font-weight: 800; font-size: 1rem; }
.checkbox-row { display: flex; gap: 18px; }
.chk { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 500; color: #374151; cursor: pointer; }
.chk input { width: 15px; height: 15px; accent-color: #7C3AED; cursor: pointer; }

/* Buttons */
.btn { padding: 9px 18px; border-radius: 9px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.12s; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, #7C3AED, #EC4899); color: white; flex: 1; }
.btn-primary:hover { opacity: 0.92; }
.btn-ghost { background: #F3F4F6; color: #6B7280; }
.btn-ghost:hover { background: #E5E7EB; }

/* Export button */
.export-btn { padding: 6px 12px; border-radius: 7px; border: 1.5px solid #E5E7EB; background: white; font-size: 0.75rem; font-weight: 600; color: #6B7280; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.export-btn:hover { border-color: #7C3AED; color: #7C3AED; }

/* Empty state */
.empty { text-align: center; padding: 36px 20px; color: #9CA3AF; }
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-text { font-size: 0.85rem; line-height: 1.6; }

/* Top bar between section title and content */
.top-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

/* Divider */
.divider { height: 1px; background: #F3F4F6; margin: 8px 0; }

/* Responsive */
@media (min-width: 600px) {
  .metrics-grid { grid-template-columns: repeat(4, 1fr); }
  .overlay { align-items: center; padding: 16px; }
  .modal { border-radius: 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>🛍️ Joyce 代購 CRM</h1>
    <p>歐洲代購管理系統 2021–2026</p>
  </div>
  <div class="header-right" id="save-status">載入中...</div>
</div>

<!-- Nav -->
<div class="nav">
  <div class="nav-btn active" onclick="switchTab('dashboard', this)">📊 儀表板</div>
  <div class="nav-btn" onclick="switchTab('orders', this)">📦 訂單</div>
  <div class="nav-btn" onclick="switchTab('customers', this)">👥 客戶</div>
</div>

<!-- Content -->
<div class="content">

  <!-- ===== DASHBOARD ===== -->
  <div id="tab-dashboard" class="tab-pane active">
    <!-- Year pills -->
    <div class="card card-sm" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:0.75rem;font-weight:700;color:#6B7280;">年份</span>
        <div id="year-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      </div>
    </div>
    <div class="metrics-grid" id="metrics"></div>
    <div id="dash-alerts"></div>
    <div class="card card-sm">
      <div class="section-title">月份明細 <span id="dash-year-label"></span></div>
      <div id="monthly-stats"></div>
    </div>
    <div class="card card-sm">
      <div class="section-title">客戶利潤排行 <span>TOP 5</span></div>
      <div id="top-customers"></div>
    </div>
    <div class="card card-sm">
      <div class="section-title">⚠️ 待收款訂單</div>
      <div id="unpaid-list"></div>
    </div>
  </div>

  <!-- ===== ORDERS ===== -->
  <div id="tab-orders" class="tab-pane">
    <div class="filter-bar">
      <input type="text" id="q" placeholder="搜尋客戶 / 商品..." oninput="renderOrders()">
      <select id="f-year" onchange="renderOrders()">
        <option value="">全部年份</option>
        <option value="2021">2021</option><option value="2022">2022</option>
        <option value="2023">2023</option><option value="2024">2024</option>
        <option value="2025">2025</option><option value="2026">2026</option>
      </select>
      <select id="f-month" onchange="renderOrders()">
        <option value="">全部月份</option>
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3">3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
      <select id="f-customer" onchange="renderOrders()">
        <option value="">全部客戶</option>
      </select>
      <select id="f-status" onchange="renderOrders()">
        <option value="">全部狀態</option>
        <option value="unpaid">未收款</option>
        <option value="unshipped">未出貨</option>
        <option value="missing">成本未填</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">⬇ 匯出CSV</button>
      <label class="export-btn" style="cursor:pointer;" title="可同時選多個CSV檔案">⬆ 匯入CSV<input type="file" accept=".csv" multiple style="display:none" onchange="importCSV(this)"></label>
    </div>
    <div class="table-bar" id="table-bar"></div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>客戶</th>
              <th>商品</th>
              <th style="text-align:center;">數量</th>
              <th>售價</th>
              <th>成本</th>
              <th>利潤</th>
              <th>利潤%</th>
              <th>含貨</th>
              <th>出貨</th>
              <th>收款</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== CUSTOMERS ===== -->
  <div id="tab-customers" class="tab-pane">
    <div id="customers-body"></div>
  </div>

</div>

<!-- Loading overlay -->
<div id="loading-overlay" class="show">
  <div class="spinner"></div>
  <div class="loading-text">連接雲端資料庫...</div>
</div>
<!-- Toast -->
<div id="toast"></div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="新增訂單">＋</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新增訂單</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">日期 *</label>
          <input type="date" class="form-input" id="f-date">
        </div>
        <div class="form-group">
          <label class="form-label">數量</label>
          <input type="number" class="form-input" id="f-qty" min="1" value="1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">客戶名稱 *</label>
        <input type="text" class="form-input" id="f-customer" list="cust-datalist" placeholder="輸入或選擇客戶">
        <datalist id="cust-datalist"></datalist>
      </div>
      <div class="form-group">
        <label class="form-label">商品名稱 *</label>
        <input type="text" class="form-input" id="f-product" placeholder="商品描述">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">售價—幫格（總額）</label>
          <input type="number" class="form-input" id="f-price" min="0" placeholder="0" oninput="calcProfit()">
        </div>
        <div class="form-group">
          <label class="form-label">成本（總額）</label>
          <input type="number" class="form-input" id="f-cost" min="0" placeholder="0" oninput="calcProfit()">
        </div>
      </div>
      <div class="profit-box">
        <span class="profit-box-label">預估利潤</span>
        <span class="profit-box-val" id="profit-preview" style="color:#7C3AED;">—</span>
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input type="text" class="form-input" id="f-notes" placeholder="例：折扣1000、特殊款式...">
      </div>
      <div class="checkbox-row">
        <label class="chk"><input type="checkbox" id="f-shipping"> 含貨</label>
        <label class="chk"><input type="checkbox" id="f-shipped"> 出貨</label>
        <label class="chk"><input type="checkbox" id="f-paid"> 收款</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveOrder()">儲存訂單</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SUPABASE
// ============================================================
const { createClient } = supabase;
const db = createClient(
  'https://pstobgspnvxvpcwmdfkv.supabase.co',
  'sb_publishable_ltCisjrJufmCwWqfo5PHTQ_mSYqCtpf'
);

let orders = [];
let editId = null;

function showLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('show', on);
}

let toastTimer;
function toast(msg, ms = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

function setStatus(txt) {
  document.getElementById('save-status').textContent = txt;
}

function uid() {
  return crypto.randomUUID();
}

// ── DB helpers ──────────────────────────────────────────────
async function dbLoad() {
  showLoading(true);
  const { data, error } = await db.from('orders').select('*').order('date', { ascending: false });
  showLoading(false);
  if (error) { alert('載入失敗：' + error.message); return; }
  orders = (data || []).map(o => ({
    ...o,
    price: Number(o.price) || 0,
    cost: Number(o.cost) || 0,
    qty: Number(o.qty) || 1
  }));
  setStatus(orders.length + ' 筆訂單');
  renderDashboard();
  renderOrders();
  if (currentTab === 'customers') renderCustomers();
}

async function dbUpsert(order) {
  const { error } = await db.from('orders').upsert(order);
  if (error) { toast('❌ 儲存失敗：' + error.message, 4000); return false; }
  const t = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  setStatus('已儲存 ' + t);
  return true;
}

async function dbDelete(id) {
  const { error } = await db.from('orders').delete().eq('id', id);
  if (error) { toast('❌ 刪除失敗：' + error.message, 4000); return false; }
  return true;
}

async function dbUpdate(id, fields) {
  const { error } = await db.from('orders').update(fields).eq('id', id);
  if (error) { toast('❌ 更新失敗：' + error.message, 4000); return false; }
  const t = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  setStatus('已儲存 ' + t);
  return true;
}

// ============================================================
// TABS
// ============================================================
let currentTab = 'dashboard';
let dashYear = '';  // '' = 全部

function switchTab(tab, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');
  currentTab = tab;
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'orders') renderOrders();
  if (tab === 'customers') renderCustomers();
}

// ============================================================
// DASHBOARD
// ============================================================
function setDashYear(y) {
  dashYear = y;
  renderDashboard();
}

function renderDashboard() {
  // Year pills
  const allYears = [...new Set(orders.map(o => o.date ? o.date.slice(0,4) : null).filter(Boolean))].sort();
  const pillsHtml = [''].concat(allYears).map(y => {
    const label = y || '全部';
    const active = dashYear === y ? 'style="background:#7C3AED;color:white;border-color:#7C3AED;"' : 'style="background:white;color:#6B7280;border:1.5px solid #E5E7EB;"';
    return `<span ${active} onclick="setDashYear('${y}')" style="padding:4px 12px;border-radius:99px;font-size:0.78rem;cursor:pointer;font-weight:600;">${label}</span>`;
  }).join('');
  document.getElementById('year-pills').innerHTML = pillsHtml;
  document.getElementById('dash-year-label').textContent = dashYear || '全部年份';

  const all = dashYear ? orders.filter(o => o.date && o.date.startsWith(dashYear)) : orders;
  const totalRev = all.reduce((s, o) => s + (o.price || 0), 0);
  const totalCost = all.reduce((s, o) => s + (o.cost || 0), 0);
  const totalProfit = totalRev - totalCost;
  const profitRate = totalRev > 0 ? (totalProfit / totalRev * 100).toFixed(1) : 0;
  const unpaid = all.filter(o => !o.paid && (o.price || 0) > 0);
  const unpaidAmt = unpaid.reduce((s, o) => s + (o.price || 0), 0);
  const curMonth = new Date().getMonth() + 1;
  const curYear = String(new Date().getFullYear());
  const thisMonth = all.filter(o => o.date && new Date(o.date).getMonth() + 1 === curMonth && (!dashYear || dashYear === curYear));
  const monthProfit = thisMonth.reduce((s, o) => s + ((o.price || 0) - (o.cost || 0)), 0);

  document.getElementById('metrics').innerHTML = `
    <div class="metric-card purple">
      <div class="metric-label">總營收</div>
      <div class="metric-value">$${fmt(totalRev)}</div>
      <div class="metric-sub">${all.length} 筆訂單</div>
    </div>
    <div class="metric-card green">
      <div class="metric-label">總利潤</div>
      <div class="metric-value">$${fmt(totalProfit)}</div>
      <div class="metric-sub">利潤率 ${profitRate}%</div>
    </div>
    <div class="metric-card ${unpaidAmt > 0 ? 'red' : 'green'}">
      <div class="metric-label">待收款</div>
      <div class="metric-value">$${fmt(unpaidAmt)}</div>
      <div class="metric-sub">${unpaid.length} 筆未收</div>
    </div>
    <div class="metric-card pink">
      <div class="metric-label">${dashYear||curYear}/${curMonth}月利潤</div>
      <div class="metric-value">$${fmt(monthProfit)}</div>
      <div class="metric-sub">${thisMonth.length} 筆訂單</div>
    </div>
  `;

  // Alerts
  const missing = all.filter(o => !o.cost || o.cost === 0);
  let alerts = '';
  if (missing.length > 0) {
    alerts += `<div class="alert alert-warn">⚠️ 有 <strong>${missing.length}</strong> 筆訂單成本未填寫，利潤計算不準確，請至「訂單」頁面補充。</div>`;
  }
  if (all.length === 0) {
    alerts += `<div class="alert alert-info">👋 歡迎使用 Joyce 代購 CRM！點右下角 <strong>＋</strong> 按鈕新增第一筆訂單。</div>`;
  }
  document.getElementById('dash-alerts').innerHTML = alerts;

  // Monthly breakdown
  const months = {};
  // When showing all years, group by year+month; otherwise just month
  all.forEach(o => {
    if (!o.date) return;
    const d = new Date(o.date);
    const key = dashYear ? String(d.getMonth() + 1) : o.date.slice(0,4) + '/' + String(d.getMonth()+1).padStart(2,'0');
    if (!months[key]) months[key] = { rev: 0, profit: 0, count: 0, label: dashYear ? (d.getMonth()+1)+'月' : o.date.slice(0,4)+'年'+(d.getMonth()+1)+'月' };
    months[key].rev += o.price || 0;
    months[key].profit += (o.price || 0) - (o.cost || 0);
    months[key].count++;
  });
  const mKeys = Object.keys(months).sort();
  const maxP = Math.max(...mKeys.map(m => months[m].profit), 1);
  document.getElementById('monthly-stats').innerHTML = mKeys.length > 0
    ? mKeys.map(m => `
      <div style="margin-bottom:10px;">
        <div class="stat-row" style="border:none;padding:0 0 3px;">
          <span class="stat-label">${months[m].label}（${months[m].count}筆）</span>
          <span>
            <span class="stat-val green" style="margin-right:10px;">+$${fmt(months[m].profit)}</span>
            <span style="font-size:0.75rem;color:#9CA3AF;">營收 $${fmt(months[m].rev)}</span>
          </span>
        </div>
        <div class="progress"><div class="progress-bar" style="width:${Math.max(4, months[m].profit/maxP*100)}%"></div></div>
      </div>`)
    .join('')
    : '<div class="empty" style="padding:16px 0;"><div class="empty-text">尚無資料</div></div>';

  // Top customers
  const custs = custStats();
  const top = Object.entries(custs).sort((a,b) => b[1].profit - a[1].profit).slice(0, 5);
  const maxCP = Math.max(...top.map(c => c[1].profit), 1);
  document.getElementById('top-customers').innerHTML = top.length > 0
    ? top.map(([name, s]) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:3px;">
          <span style="font-weight:600;">${name}</span>
          <span class="stat-val green">+$${fmt(s.profit)}</span>
        </div>
        <div class="progress"><div class="progress-bar" style="width:${Math.max(4, s.profit/maxCP*100)}%"></div></div>
      </div>`)
    .join('')
    : '<div class="empty" style="padding:16px 0;"><div class="empty-text">尚無資料</div></div>';

  // Unpaid
  document.getElementById('unpaid-list').innerHTML = unpaid.length > 0
    ? unpaid.slice(0, 8).map(o => `
      <div class="stat-row">
        <span class="stat-label">${o.customer}・${o.product}${o.qty > 1 ? ' ×'+o.qty : ''}</span>
        <span class="stat-val red">$${fmt(o.price)}</span>
      </div>`)
    .join('')
    : '<div style="color:#9CA3AF;font-size:0.82rem;padding:6px 0;">✅ 全部已收款，太棒了！</div>';
}

function renderOrders() {
  // Update customer dropdown
  const custs = [...new Set(orders.map(o => o.customer).filter(Boolean))].sort();
  const fCust = document.getElementById('f-customer');
  const saved = fCust.value;
  fCust.innerHTML = '<option value="">全部客戶</option>' +
    custs.map(c => `<option value="${esc(c)}" ${c===saved?'selected':''}>${esc(c)}</option>`).join('');

  // Datalist
  document.getElementById('cust-datalist').innerHTML = custs.map(c => `<option value="${esc(c)}">`).join('');

  // Filters
  const q = document.getElementById('q').value.toLowerCase();
  const year = document.getElementById('f-year').value;
  const month = document.getElementById('f-month').value;
  const custF = document.getElementById('f-customer').value;
  const statusF = document.getElementById('f-status').value;

  let list = orders.filter(o => {
    if (q && !o.customer?.toLowerCase().includes(q) && !o.product?.toLowerCase().includes(q)) return false;
    if (year && o.date && !o.date.startsWith(year)) return false;
    if (month && o.date && new Date(o.date).getMonth() + 1 != month) return false;
    if (custF && o.customer !== custF) return false;
    if (statusF === 'unpaid' && (o.paid || !o.price)) return false;
    if (statusF === 'unshipped' && o.shipped) return false;
    if (statusF === 'missing' && (o.cost || 0) > 0) return false;
    return true;
  });

  list = list.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const totalRev = list.reduce((s, o) => s + (o.price || 0), 0);
  const totalProfit = list.reduce((s, o) => s + ((o.price || 0) - (o.cost || 0)), 0);

  document.getElementById('table-bar').innerHTML =
    `<span>共 <strong>${list.length}</strong> 筆</span>` +
    `<span>營收：<strong>$${fmt(totalRev)}</strong></span>` +
    `<span>利潤：<strong style="color:${totalProfit>=0?'#059669':'#DC2626'};">$${fmt(totalProfit)}</strong></span>`;

  const tbody = document.getElementById('orders-body');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:28px;color:#9CA3AF;">沒有符合條件的訂單</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(o => {
    const profit = (o.price != null && o.cost != null) ? o.price - o.cost : null;
    const pct = (profit != null && o.cost > 0) ? (profit / o.cost * 100).toFixed(1) : null;
    const dateStr = o.date ? new Date(o.date).toLocaleDateString('zh-TW', {year:'numeric', month:'numeric', day:'numeric'}) : '—';
    const profitCls = profit != null ? (profit >= 0 ? 'pos' : 'neg') : '';

    return `<tr>
      <td style="white-space:nowrap;color:#6B7280;">${dateStr}</td>
      <td style="font-weight:700;">${esc(o.customer||'—')}</td>
      <td>${esc(o.product||'—')}${o.notes ? '<br><span style="font-size:0.68rem;color:#9CA3AF;">'+esc(o.notes)+'</span>' : ''}</td>
      <td style="text-align:center;">${o.qty||1}</td>
      <td>${o.price ? '$'+fmt(o.price) : '<span class="missing-tag">未填</span>'}</td>
      <td>${o.cost ? '$'+fmt(o.cost) : '<span class="missing-tag">未填</span>'}</td>
      <td class="${profitCls}">${profit!=null ? '$'+fmt(profit) : '<span class="missing-tag">?</span>'}</td>
      <td class="${profitCls}">${pct!=null ? pct+'%' : '—'}</td>
      <td><button class="s-btn ${o.shipping?'on':'off'}" onclick="toggle('${o.id}','shipping')">含貨</button></td>
      <td><button class="s-btn ${o.shipped?'on':'off'}" onclick="toggle('${o.id}','shipped')">出貨</button></td>
      <td><button class="s-btn ${o.paid?'on':'off'}" onclick="toggle('${o.id}','paid')">收款</button></td>
      <td style="white-space:nowrap;">
        <button class="icon-btn" onclick="editOrder('${o.id}')" title="編輯">✏️</button>
        <button class="icon-btn" onclick="delOrder('${o.id}')" title="刪除" style="color:#DC2626;">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

async function toggle(id, field) {
  const o = orders.find(o => o.id === id);
  if (!o) return;
  o[field] = !o[field];
  renderOrders(); // optimistic
  await dbUpdate(id, { [field]: o[field] });
}

async function delOrder(id) {
  if (!confirm('確定刪除這筆訂單？')) return;
  orders = orders.filter(o => o.id !== id);
  renderOrders();
  if (currentTab === 'dashboard') renderDashboard();
  const ok = await dbDelete(id);
  if (!ok) await dbLoad();
  else toast('🗑️ 已刪除');
}

// ============================================================
function custStats() {
  const m = {};
  orders.forEach(o => {
    if (!o.customer) return;
    if (!m[o.customer]) m[o.customer] = { profit: 0, rev: 0, count: 0, unpaid: 0 };
    m[o.customer].profit += (o.price || 0) - (o.cost || 0);
    m[o.customer].rev += o.price || 0;
    m[o.customer].count++;
    if (!o.paid && o.price) m[o.customer].unpaid += o.price;
  });
  return m;
}

function renderCustomers() {
  const stats = custStats();
  const sorted = Object.entries(stats).sort((a, b) => b[1].count - a[1].count);
  if (sorted.length === 0) {
    document.getElementById('customers-body').innerHTML =
      '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">尚無客戶資料<br>新增訂單後會自動建立</div></div>';
    return;
  }
  document.getElementById('customers-body').innerHTML = sorted.map(([name, s]) => `
    <div class="cust-card">
      <div class="avatar">${name.charAt(0)}</div>
      <div>
        <div class="cust-name">${esc(name)}</div>
        <div class="cust-meta">${s.count} 筆訂單・營收 $${fmt(s.rev)}</div>
        ${s.unpaid > 0 ? '<span class="badge badge-red" style="margin-top:4px;">待收 $'+fmt(s.unpaid)+'</span>' : ''}
      </div>
      <div class="cust-stats">
        <div class="cust-profit">+$${fmt(s.profit)}</div>
        <div class="cust-orders">利潤</div>
      </div>
    </div>`).join('');
}

  document.getElementById('order-form-err') && (document.getElementById('order-form-err').textContent = '');

    const o = orders.find(x => x.id === id);
    if (!o) return;
    document.getElementById('f-date').value = o.date || '';
    document.getElementById('f-customer').value = o.customer || '';
    document.getElementById('f-product').value = o.product || '';
    document.getElementById('f-qty').value = o.qty || 1;
    document.getElementById('f-price').value = o.price || '';
    document.getElementById('f-cost').value = o.cost || '';
    document.getElementById('f-notes').value = o.notes || '';

    document.getElementById('f-qty').value = 1;
    document.getElementById('f-price').value = '';

    document.getElementById('f-notes').value = '';

    document.getElementById('f-shipped').checked = false;
    document.getElementById('f-paid').checked = false;
  }
  calcProfit();
  document.getElementById('overlay').classList.add('open');

  // Update datalist
  const custs = [...new Set(orders.map(o => o.customer).filter(Boolean))].sort();
  document.getElementById('cust-datalist').innerHTML = custs.map(c => `<option value="${esc(c)}">`).join('');
}

function editOrder(id) { openModal(id); }

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function calcProfit() {
  const p = parseFloat(document.getElementById('f-price').value) || 0;
  const c = parseFloat(document.getElementById('f-cost').value) || 0;
  const el = document.getElementById('profit-preview');
  if (p && c) {
    const profit = p - c;
    const pct = c > 0 ? (profit / c * 100).toFixed(1) : '—';
    el.textContent = (profit >= 0 ? '+' : '') + '$' + fmt(profit) + '（' + pct + '%）';
    el.style.color = profit >= 0 ? '#059669' : '#DC2626';
  } else {
    el.textContent = '—';
    el.style.color = '#7C3AED';
  }
}

async function saveOrder() {
  const date = document.getElementById('f-date').value;
  const customer = document.getElementById('f-customer').value.trim();
  const product = document.getElementById('f-product').value.trim();
  const qty = parseInt(document.getElementById('f-qty').value) || 1;
  const price = parseFloat(document.getElementById('f-price').value) || 0;
  const cost = parseFloat(document.getElementById('f-cost').value) || 0;
  const notes = document.getElementById('f-notes').value.trim();
  const shipping = document.getElementById('f-shipping').checked;
  const shipped = document.getElementById('f-shipped').checked;
  const paid = document.getElementById('f-paid').checked;

  if (!date || !customer || !product) {
    alert('請填寫日期、客戶名稱和商品名稱');
    return;
  }

  const order = { date, customer, product, qty, price, cost, notes, shipping, shipped, paid,
    id: editId || uid() };

  if (editId) {
    const idx = orders.findIndex(x => x.id === editId);
    if (idx >= 0) orders[idx] = order;
  } else {
    orders.unshift(order);
  }

  closeModal();
  renderOrders();
  if (currentTab === 'dashboard') renderDashboard();
  if (currentTab === 'customers') renderCustomers();

  const ok = await dbUpsert(order);
  if (!ok) await dbLoad();
  else toast('✅ 已儲存');
}

// ============================================================
// IMPORT CSV  (支援原始Excel格式：日期,訂購人,訂購商品,數量,款式or備註,幫格,成本,...,含貨,出貨,收款,備註)
// ============================================================
function detectHeaders(cols) {
  // 回傳 colMap 或 null
  const h = cols.map(c => c.trim());
  if (!h.some(x => x === '日期' || x === '訂購人')) return null;
  const find = (...keys) => { const i = h.findIndex(x => keys.some(k => x.includes(k))); return i >= 0 ? i : undefined; };
  return {
    date:     find('日期'),
    customer: find('訂購人','客戶'),
    product:  find('訂購商品','商品'),
    qty:      find('數量'),
    notes:    find('款式','備註'),
    price:    find('幫格','售價','價格'),
    cost:     find('成本'),
    shipping: find('含貨','叫貨'),
    shipped:  find('出貨'),
    paid:     find('收款'),
  };
}

function parseOneCSV(text, csvYear) {
  const lines = text.split(/\r?\n/);
  const rows = [];
  let skipped = 0;
  let colMap = null;

  for (const line of lines) {
    const cols = parseCSVLine(line);
    if (cols.length < 4) continue;

    // 嘗試偵測表頭
    if (!colMap) {
      const detected = detectHeaders(cols);
      if (detected) { colMap = detected; continue; } // 跳過表頭列
    }

    // 沿用偵測到的欄位，或 fallback 到固定位置
    const cm = colMap || { date:0, customer:1, product:2, qty:3, notes:4, price:5, cost:6, shipping:9, shipped:10, paid:11 };
    const g = i => (i !== undefined && cols[i] !== undefined) ? cols[i].trim() : '';

    const dateRaw  = g(cm.date);
    const customer = g(cm.customer);
    const product  = g(cm.product);
    if (!dateRaw || !customer || !product) continue;
    if (dateRaw === '日期' || dateRaw.includes('總計') || dateRaw.includes('幫格')) continue;

    let date = '';
    const m = dateRaw.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (m) {
      date = csvYear + '-' + String(m[1]).padStart(2,'0') + '-' + String(m[2]).padStart(2,'0');
    } else if (dateRaw.match(/^\d{4}-\d{2}-\d{2}$/)) {
      date = dateRaw;
    } else { skipped++; continue; }

    const qty      = parseInt(g(cm.qty)) || 1;
    const notes    = g(cm.notes);
    const price    = parseFloat(g(cm.price)) || 0;
    const cost     = parseFloat(g(cm.cost)) || 0;
    const shipping = /yes/i.test(g(cm.shipping));
    const shipped  = /yes/i.test(g(cm.shipped));
    const paid     = /yes/i.test(g(cm.paid));
    rows.push({ id: uid(), date, customer, product, qty, price, cost, notes, shipping, shipped, paid });
  }
  return { rows, skipped };
}

async function importCSV(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  // 如果只有一個檔案，問年份；多個檔案讓系統從檔名猜，找不到再問
  const loadEl = document.querySelector('#loading-overlay .loading-text');
  const BATCH = 500;
  let totalImported = 0, totalSkipped = 0;

  for (let fi = 0; fi < files.length; fi++) {
    const file = files[fi];
    // 從檔名猜年份，例如 "歐洲記帳2023.csv" → 2023
    const guessYear = (file.name.match(/20\d{2}/) || [])[0] || String(new Date().getFullYear());
    let csvYear;
    if (files.length === 1) {
      const ans = prompt(`這份CSV是哪一年的資料？\n（輸入年份，例如：2026）`, guessYear);
      if (!ans || !/^\d{4}$/.test(ans.trim())) { input.value=''; alert('年份格式不正確'); return; }
      csvYear = ans.trim();
    } else {
      // 多檔模式：直接用猜到的年份，若無法猜就顯示檔名問一次
      csvYear = guessYear;
      if (!guessYear.match(/^20\d{2}$/)) {
        const ans = prompt(`「${file.name}」是哪一年的資料？`, String(new Date().getFullYear()));
        if (!ans || !/^\d{4}$/.test(ans.trim())) continue;
        csvYear = ans.trim();
      }
    }

    const text = await file.text();
    const { rows, skipped } = parseOneCSV(text, csvYear);
    totalSkipped += skipped;
    if (rows.length === 0) continue;

    showLoading(true);
    for (let i = 0; i < rows.length; i += BATCH) {
      const chunk = rows.slice(i, i + BATCH);
      loadEl.textContent = `${file.name}：上傳 ${Math.min(i+BATCH, rows.length)}/${rows.length} 筆（檔案 ${fi+1}/${files.length}）`;
      const { error } = await db.from('orders').upsert(chunk);
      if (error) { showLoading(false); alert(`「${file.name}」上傳失敗：` + error.message); return; }
      totalImported += chunk.length;
    }
  }

  loadEl.textContent = '連接雲端資料庫...';
  input.value = '';
  showLoading(false);
  if (totalImported === 0) { alert('沒有成功匯入任何資料，請確認CSV格式正確（UTF-8編碼）'); return; }
  await dbLoad();
  alert(`✅ 成功匯入 ${totalImported} 筆訂單！${totalSkipped > 0 ? '（略過 '+totalSkipped+' 列）' : ''}`);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result.map(s => s.replace(/^"|"$/g,''));
}

function exportCSV() {
  if (orders.length === 0) { alert('沒有資料可匯出'); return; }
  const headers = ['日期','客戶','商品','數量','售價（幫格）','成本','利潤','利潤%','含貨','出貨','收款','備註'];
  const rows = orders.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(o => {
    const profit = (o.price||0) - (o.cost||0);
    const pct = o.cost > 0 ? (profit/o.cost*100).toFixed(1)+'%' : '';
    return [
      o.date, o.customer, o.product, o.qty,
      o.price||'', o.cost||'', profit||'', pct,
      o.shipping?'YES':'', o.shipped?'YES':'', o.paid?'YES':'', o.notes||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Joyce代購記帳_' + new Date().toLocaleDateString('zh-TW').replace(/\//g,'-') + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ============================================================
// UTILS
// ============================================================
function fmt(n) { return Number(n || 0).toLocaleString(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// INIT
// ============================================================
dbLoad();
</script>
