<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圖生影片工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 28px;
      color: #fff;
      letter-spacing: 2px;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 5px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      background: #111118;
      border: 1px solid #2e2e40;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.88rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #5b5bef; }
    textarea { resize: vertical; line-height: 1.5; }

    /* Model price tag */
    .model-price {
      display: inline-block;
      font-size: 0.75rem;
      color: #facc15;
      background: #2a2a10;
      border: 1px solid #5a5010;
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #2e2e40;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone.drag-over { border-color: #5b5bef; background: #1a1a30; }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }
    #drop-zone p { color: #888; font-size: 0.9rem; }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    #preview-wrap { display: none; margin-top: 14px; text-align: center; }
    #preview-wrap img {
      max-height: 260px; max-width: 100%;
      border-radius: 8px; border: 1px solid #2e2e40;
    }
    #preview-wrap button {
      display: block; margin: 8px auto 0;
      background: none; border: none; color: #888;
      font-size: 0.8rem; cursor: pointer; text-decoration: underline;
    }

    #prompt-result {
      min-height: 80px;
      background: #111118;
      border: 1px solid #2e2e40;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #ccc;
    }
    #prompt-result.empty { color: #444; font-style: italic; }

    .btn {
      width: 100%; padding: 13px; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-analyze { background: linear-gradient(135deg, #5b5bef, #8b5cf6); color: #fff; }
    .btn-generate { background: linear-gradient(135deg, #ef5b5b, #f97316); color: #fff; }

    #status-box {
      display: none; background: #111118;
      border: 1px solid #2e2e40; border-radius: 8px;
      padding: 14px 16px; font-size: 0.85rem; color: #aaa; line-height: 1.6;
    }
    #status-box.show { display: block; }
    .status-line { margin-bottom: 4px; }
    .status-ok { color: #4ade80; }
    .status-err { color: #f87171; }
    .status-wait { color: #facc15; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #444; border-top-color: #5b5bef;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    /* Model params sections */
    .model-params { display: none; }
    .model-params.active { display: block; }
  </style>
</head>
<body>
  <h1>圖生影片工具</h1>

  <div class="container">

    <!-- API Keys -->
    <div class="card">
      <h2>API 設定</h2>
      <div class="row">
        <div>
          <label>OpenRouter API Key</label>
          <input type="password" id="or-key" value="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" />
        </div>
        <div>
          <label>kie.ai API Key</label>
          <input type="password" id="kie-key" value="974766152b47124eccb7b1ef6407a0e9" />
        </div>
      </div>
    </div>

    <!-- LLM Settings -->
    <div class="card">
      <h2>LLM 設定（圖片分析）</h2>
      <label>選擇模型</label>
      <select id="model-select">
        <option value="google/gemini-2.0-flash-001" selected>Gemini 2.0 Flash</option>
        <option value="google/gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro Preview</option>
        <option value="google/gemini-2.0-flash-exp:free">Gemini 2.0 Flash (Free)</option>
        <option value="google/gemini-pro-1.5">Gemini Pro 1.5</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
        <option value="meta-llama/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision</option>
      </select>
      <label>System Prompt</label>
      <textarea id="system-prompt" rows="4">分析這張電商產品圖，產生一段適合短影片的腳本描述</textarea>
    </div>

    <!-- Image Upload -->
    <div class="card">
      <h2>上傳圖片</h2>
      <div id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="icon">🖼️</div>
        <p>拖曳圖片到這裡，或點擊選擇檔案</p>
        <p style="font-size:0.75rem; margin-top:6px; color:#555;">支援 JPG、PNG、WEBP（最大 10MB）</p>
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="預覽" />
        <button onclick="clearImage()">✕ 移除圖片</button>
      </div>
    </div>

    <!-- Analyze -->
    <button class="btn btn-analyze" id="btn-analyze" onclick="analyzeImage()" disabled>
      分析圖片，產生 Prompt
    </button>

    <!-- Generated Prompt -->
    <div class="card">
      <h2>產生的 Prompt（可編輯）</h2>
      <div id="prompt-result" class="empty" contenteditable="true">尚未產生 Prompt</div>
    </div>

    <!-- Video Model Settings -->
    <div class="card">
      <h2>影片生成設定（kie.ai）</h2>

      <label>選擇影片模型</label>
      <select id="video-model" onchange="onModelChange()">
        <optgroup label="─ Sora 2">
          <option value="sora-2-image-to-video-stable" data-price="~$0.175/支" selected>Sora 2 Stable  ·  ~$0.175 / 10秒</option>
          <option value="sora-2-image-to-video" data-price="~$1/支">Sora 2 標準  ·  ~$1 / 10秒</option>
          <option value="sora-2-pro-image-to-video-720" data-price="~$3/支">Sora 2 Pro 720p  ·  ~$3 / 10秒</option>
          <option value="sora-2-pro-image-to-video-1080" data-price="~$5/支">Sora 2 Pro 1080p  ·  ~$5 / 10秒</option>
        </optgroup>
        <optgroup label="─ Google Veo">
          <option value="veo-3-1-fast" data-price="$0.40/支">Veo 3.1 Fast  ·  $0.40 / 支</option>
          <option value="veo-3-1-quality" data-price="$2.00/支">Veo 3.1 Quality  ·  $2.00 / 支</option>
        </optgroup>
        <optgroup label="─ Kling">
          <option value="kling/v2-1-pro" data-price="查官網">Kling v2.1 Pro</option>
        </optgroup>
        <optgroup label="─ Hailuo">
          <option value="hailuo/2-3-image-to-video-pro" data-price="查官網">Hailuo 2.3 Pro</option>
        </optgroup>
        <optgroup label="─ Wan">
          <option value="wan/2-6-image-to-video" data-price="查官網">Wan 2.6</option>
        </optgroup>
      </select>

      <!-- Sora params -->
      <div id="params-sora" class="model-params active">
        <div class="row">
          <div>
            <label>影片長度</label>
            <select id="sora-frames">
              <option value="10" selected>10 秒</option>
              <option value="15">15 秒（Pro 限定）</option>
            </select>
          </div>
          <div>
            <label>畫面方向</label>
            <select id="sora-aspect">
              <option value="landscape" selected>橫向 Landscape</option>
              <option value="portrait">直向 Portrait</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Kling params -->
      <div id="params-kling" class="model-params">
        <div class="row">
          <div>
            <label>影片長度</label>
            <select id="kling-duration">
              <option value="5" selected>5 秒</option>
              <option value="10">10 秒</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Hailuo params -->
      <div id="params-hailuo" class="model-params">
        <div class="row">
          <div>
            <label>影片長度</label>
            <select id="hailuo-duration">
              <option value="6" selected>6 秒</option>
              <option value="10">10 秒</option>
            </select>
          </div>
          <div>
            <label>解析度</label>
            <select id="hailuo-res">
              <option value="768p" selected>768p</option>
              <option value="1080p">1080p（僅 6 秒）</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Wan params -->
      <div id="params-wan" class="model-params">
        <div class="row">
          <div>
            <label>影片長度</label>
            <select id="wan-duration">
              <option value="5" selected>5 秒</option>
              <option value="10">10 秒</option>
              <option value="15">15 秒</option>
            </select>
          </div>
          <div>
            <label>解析度</label>
            <select id="wan-res">
              <option value="720p" selected>720p</option>
              <option value="1080p">1080p</option>
            </select>
          </div>
        </div>
      </div>

    </div>

    <!-- Generate Video -->
    <button class="btn btn-generate" id="btn-generate" onclick="generateVideo()" disabled>
      送出 kie.ai，生成影片
    </button>

    <!-- Status -->
    <div id="status-box"></div>

  </div>

  <script>
    let imageBase64 = null;
    let imageMime = 'image/jpeg';
    let imageFileName = 'image.jpg';

    // --- Model change handler ---
    function onModelChange() {
      const val = document.getElementById('video-model').value;
      document.querySelectorAll('.model-params').forEach(el => el.classList.remove('active'));

      if (val.startsWith('sora-2') || val.startsWith('sora-')) {
        document.getElementById('params-sora').classList.add('active');
      } else if (val.startsWith('kling')) {
        document.getElementById('params-kling').classList.add('active');
      } else if (val.startsWith('hailuo')) {
        document.getElementById('params-hailuo').classList.add('active');
      } else if (val.startsWith('wan')) {
        document.getElementById('params-wan').classList.add('active');
      }
    }

    // --- Drag & Drop ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadImage(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadImage(fileInput.files[0]);
    });

    function loadImage(file) {
      imageMime = file.type || 'image/jpeg';
      imageFileName = file.name || 'image.jpg';
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        imageBase64 = dataUrl.split(',')[1];
        document.getElementById('preview-img').src = dataUrl;
        document.getElementById('preview-wrap').style.display = 'block';
        dropZone.style.display = 'none';
        document.getElementById('btn-analyze').disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      imageBase64 = null;
      document.getElementById('preview-wrap').style.display = 'none';
      dropZone.style.display = 'block';
      fileInput.value = '';
      document.getElementById('btn-analyze').disabled = true;
      document.getElementById('btn-generate').disabled = true;
      const el = document.getElementById('prompt-result');
      el.textContent = '尚未產生 Prompt';
      el.classList.add('empty');
    }

    // --- Analyze Image (OpenRouter) ---
    async function analyzeImage() {
      const apiKey = document.getElementById('or-key').value.trim();
      const model = document.getElementById('model-select').value;
      const systemPrompt = document.getElementById('system-prompt').value.trim();

      if (!apiKey) return showStatus('請填入 OpenRouter API Key', 'err');
      if (!imageBase64) return showStatus('請先上傳圖片', 'err');

      const btn = document.getElementById('btn-analyze');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>分析中...';
      showStatus('正在分析圖片...', 'wait');

      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': 'https://frabjous-peony-72f93f.netlify.app',
            'X-Title': 'UGC Video Tool'
          },
          body: JSON.stringify({
            model,
            messages: [
              { role: 'system', content: systemPrompt },
              {
                role: 'user',
                content: [
                  { type: 'image_url', image_url: { url: `data:${imageMime};base64,${imageBase64}` } },
                  { type: 'text', text: '請根據這張圖片，產生影片 Prompt。' }
                ]
              }
            ]
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

        const content = data.choices?.[0]?.message?.content || '';
        if (!content) throw new Error('API 回傳空內容');

        const promptEl = document.getElementById('prompt-result');
        promptEl.textContent = content;
        promptEl.classList.remove('empty');
        document.getElementById('btn-generate').disabled = false;
        showStatus('✅ 分析完成，可以編輯 Prompt 後送出影片生成', 'ok');
      } catch (err) {
        showStatus(`❌ 分析失敗：${err.message}`, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = '分析圖片，產生 Prompt';
      }
    }

    // --- Upload image to kie.ai ---
    async function uploadImageToKie(apiKey) {
      showStatus('⬆️ 上傳圖片到 kie.ai...', 'wait');
      const res = await fetch('https://api.kie.ai/api/file-base64-upload', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          base64Data: `data:${imageMime};base64,${imageBase64}`,
          uploadPath: 'ugc-tool',
          fileName: imageFileName
        })
      });
      const data = await res.json();
      if (!res.ok || !data.data?.downloadUrl) {
        throw new Error('圖片上傳失敗：' + (data.msg || JSON.stringify(data)));
      }
      return data.data.downloadUrl;
    }

    // --- Build request body by model ---
    function buildTaskBody(model, imageUrl, prompt) {
      if (model === 'sora-2-image-to-video-stable') {
        return {
          model: 'sora-2-image-to-video-stable',
          input: {
            prompt,
            image_urls: [imageUrl],
            upload_method: 's3',
            aspect_ratio: document.getElementById('sora-aspect').value,
            n_frames: document.getElementById('sora-frames').value
          }
        };
      }
      if (model === 'sora-2-image-to-video') {
        return {
          model: 'sora-2-image-to-video',
          input: {
            prompt,
            image_urls: [imageUrl],
            upload_method: 's3',
            aspect_ratio: document.getElementById('sora-aspect').value,
            n_frames: document.getElementById('sora-frames').value
          }
        };
      }
      if (model === 'sora-2-pro-image-to-video-720') {
        return {
          model: 'sora-2-pro-image-to-video',
          input: {
            prompt,
            image_urls: [imageUrl],
            upload_method: 's3',
            aspect_ratio: document.getElementById('sora-aspect').value,
            n_frames: document.getElementById('sora-frames').value,
            size: 'standard'
          }
        };
      }
      if (model === 'sora-2-pro-image-to-video-1080') {
        return {
          model: 'sora-2-pro-image-to-video',
          input: {
            prompt,
            image_urls: [imageUrl],
            upload_method: 's3',
            aspect_ratio: document.getElementById('sora-aspect').value,
            n_frames: document.getElementById('sora-frames').value,
            size: 'high'
          }
        };
      }
      if (model.startsWith('kling')) {
        return {
          model,
          input: {
            prompt,
            image_url: imageUrl,
            duration: parseInt(document.getElementById('kling-duration').value)
          }
        };
      }
      if (model.startsWith('hailuo')) {
        return {
          model,
          input: {
            prompt,
            image_url: imageUrl,
            duration: parseInt(document.getElementById('hailuo-duration').value),
            resolution: document.getElementById('hailuo-res').value
          }
        };
      }
      if (model.startsWith('wan')) {
        return {
          model,
          input: {
            prompt,
            image_url: imageUrl,
            duration: parseInt(document.getElementById('wan-duration').value),
            resolution: document.getElementById('wan-res').value
          }
        };
      }
      // veo and others — generic
      return {
        model,
        input: { prompt, image_url: imageUrl }
      };
    }

    // --- Generate Video ---
    async function generateVideo() {
      const apiKey = document.getElementById('kie-key').value.trim();
      const prompt = document.getElementById('prompt-result').textContent.trim();
      const model = document.getElementById('video-model').value;

      if (!apiKey) return showStatus('請填入 kie.ai API Key', 'err');
      if (!imageBase64) return showStatus('請先上傳圖片', 'err');
      if (!prompt || prompt === '尚未產生 Prompt') return showStatus('請先產生 Prompt', 'err');

      const btn = document.getElementById('btn-generate');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>處理中...';

      try {
        // Step 1: upload image
        const imageUrl = await uploadImageToKie(apiKey);
        showStatus(`✅ 圖片上傳成功\n📤 送出影片生成請求...`, 'wait');

        // Step 2: create task
        const body = buildTaskBody(model, imageUrl, prompt);
        const res = await fetch('https://api.kie.ai/api/v1/jobs/createTask', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.msg || `HTTP ${res.status}`);

        const taskId = data.data?.taskId;
        if (!taskId) throw new Error('未取得 taskId：' + JSON.stringify(data));

        showStatus(`✅ 任務建立成功\ntask_id: ${taskId}\n⏳ 等待影片生成（約 2-5 分鐘）...`, 'wait');
        btn.innerHTML = '<span class="spinner"></span>生成中，請等待...';

        // Step 3: poll
        await pollVideo(apiKey, taskId);

      } catch (err) {
        showStatus(`❌ 失敗：${err.message}`, 'err');
        btn.disabled = false;
        btn.textContent = '送出 kie.ai，生成影片';
      }
    }

    // --- Poll ---
    async function pollVideo(apiKey, taskId) {
      const maxTries = 72; // 6 min
      for (let i = 0; i < maxTries; i++) {
        await sleep(5000);

        const res = await fetch(`https://api.kie.ai/api/v1/jobs/getTask?taskId=${taskId}`, {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        const data = await res.json();
        const status = data.data?.status;
        const progress = data.data?.progress ?? '';

        showStatus(
          `task_id: ${taskId}\n` +
          `狀態：${status}${progress ? '  進度：' + progress + '%' : ''}（第 ${i+1} 次查詢）`,
          'wait'
        );

        if (status === 'completed' || status === 'succeed' || status === 'success') {
          const videoUrl =
            data.data?.output?.video_url ||
            data.data?.output?.url ||
            data.data?.videoUrl ||
            data.data?.result?.video_url;
          if (!videoUrl) throw new Error('生成完成但找不到影片網址，回傳：' + JSON.stringify(data.data));
          showStatus(`✅ 影片生成成功！正在下載...`, 'ok');
          downloadVideo(videoUrl, `kie_${taskId}.mp4`);
          document.getElementById('btn-generate').disabled = false;
          document.getElementById('btn-generate').textContent = '送出 kie.ai，生成影片';
          return;
        }

        if (status === 'failed' || status === 'error') {
          throw new Error('生成失敗：' + JSON.stringify(data.data));
        }
      }
      throw new Error('等待超時（6 分鐘），請至 kie.ai 後台查詢');
    }

    function downloadVideo(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function showStatus(msg, type) {
      const box = document.getElementById('status-box');
      box.className = 'show';
      const cls = type === 'ok' ? 'status-ok' : type === 'err' ? 'status-err' : 'status-wait';
      box.innerHTML = msg.split('\n').map(line =>
        `<div class="status-line ${cls}">${line}</div>`
      ).join('');
    }
  </script>
</body>
</html>
